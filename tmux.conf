# Prefix and indexing
set -g prefix C-a
unbind C-b
set -s escape-time 1
set -g history-limit 50000
set -g base-index 1
set -g renumber-windows on
setw -g pane-base-index 1

# Reload config and pass the prefix through to nested apps
bind r source-file ~/.tmux.conf \; display-message "Reloaded!"
bind C-a send-prefix

# Pane splitting and navigation
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Extra split shortcuts
unbind v
unbind n
bind v split-window -h -c "#{pane_current_path}"
bind n split-window -v -c "#{pane_current_path}"

# Terminal capabilities and colors
set -g default-terminal "tmux-256color"
set -g focus-events on
set -s extended-keys on
set -g set-titles on
set -s terminal-features[0] "xterm*:RGB"
set -s terminal-features[1] "screen*:RGB"
set -s terminal-features[2] "tmux*:RGB"

# Status line
set -g status-style "fg=#f3ead9,bg=#384248"
set -g status-left-length 20
set -g status-right-length 72
set -g status-left "#[fg=#fffaf0 bg=#8fc8b8] #S #[default]"
set -g status-right "#[fg=#9ed0ff]#H #[fg=#8f989f]| #[fg=#f2c14e]%Y-%m-%d #[fg=#8f989f]| #[fg=#b8f2ff]%H:%M #[fg=#8f989f]| #[fg=#e6f2ba]%a"
set -g status-interval 60
set -g status-justify absolute-centre
set -g window-status-style "fg=#c7d1d9,bg=#384248"
set -g window-status-format " #[fg=#eef4fb bg=#6488b2] #I #[fg=#e7f1e2 bg=#6f8669] #W #[fg=#c7dbb9]#{?window_activity_flag,+,}#[fg=#d88174]#{?window_bell_flag,!,}#[default]"
set -g window-status-current-style "fg=#23252a,bg=#f2c14e"
set -g window-status-current-format " #[fg=#fffdf8 bg=#3b82f6] * #I #[fg=#23252a bg=#f2c14e] #W #[fg=#4f856d bg=#f2c14e]#{?window_activity_flag,+,}#[fg=#c85b5f bg=#f2c14e]#{?window_bell_flag,!,}#[default] "
set -g window-status-separator ""
set -g pane-border-status top
set -g pane-border-style "fg=#87949e"
set -g pane-active-border-style "fg=#9ed0ff"
set -g pane-border-format "#{?pane_active,#[fg=#fffdf8 bg=#3b82f6] #P #[fg=#fffaf0 bg=#8fc8b8] #{pane_current_command} #[fg=#23252a bg=#f2c14e] #{b:pane_current_path} ,#[fg=#e7eef7 bg=#6483a8] #P #[fg=#d7e4d1 bg=#6a8064] #{pane_current_command} #[fg=#efd792 bg=#8b7344] #{b:pane_current_path} }#[default]"
set -g message-style "fg=#fffdf8,bg=#72b2f2"
set -g mode-style "fg=#23252a,bg=#e7bd57"

# Activity and copy mode
set -g mouse on
setw -g monitor-activity on
set -g visual-activity on
setw -g mode-keys vi
unbind p
bind p paste-buffer
bind PageUp copy-mode -eu
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -n WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -e; send-keys -X -N 5 scroll-up"

# Clipboard integration
set -s set-clipboard on
run-shell 'if command -v pbcopy >/dev/null 2>&1 && command -v pbpaste >/dev/null 2>&1; then \
  tmux set-option -s copy-command "pbcopy"; \
  tmux bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel; \
  tmux bind-key C-c run-shell "tmux save-buffer - | pbcopy"; \
  tmux bind-key C-v run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"; \
elif command -v wl-copy >/dev/null 2>&1 && command -v wl-paste >/dev/null 2>&1; then \
  tmux set-option -s copy-command "wl-copy"; \
  tmux bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel; \
  tmux bind-key C-c run-shell "tmux save-buffer - | wl-copy"; \
  tmux bind-key C-v run-shell "wl-paste --no-newline | tmux load-buffer - && tmux paste-buffer"; \
elif command -v xclip >/dev/null 2>&1; then \
  tmux set-option -s copy-command "xclip -in -selection clipboard"; \
  tmux bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel; \
  tmux bind-key C-c run-shell "tmux save-buffer - | xclip -in -selection clipboard"; \
  tmux bind-key C-v run-shell "xclip -o -selection clipboard | tmux load-buffer - && tmux paste-buffer"; \
fi'

# Follow the system login shell by leaving default-shell unset.
